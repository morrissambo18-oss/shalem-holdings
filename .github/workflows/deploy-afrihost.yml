name: Deploy to Afrihost

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: afrihost-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run QA checks and build website
        run: npm run check

      - name: Deploy production build
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.AFRIHOST_FTP_SERVER }}
          username: ${{ secrets.AFRIHOST_FTP_USERNAME }}
          password: ${{ secrets.AFRIHOST_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ./
